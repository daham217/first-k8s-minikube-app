apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: k8s-app
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: k8s-app/nginx:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
  volumes:
    - name: nginx-config
      configMap:
        name: app-config
